trigger:
  branches:
    include:
      - 'main'

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: 1
  DOTNET_GENERATE_ASPNET_CERTIFICATE: 0

  IS_PULLREQUEST: $[ eq(variables['Build.Reason'], 'PullRequest') ]
  IS_MAIN_BRANCH: $[ eq(variables['Build.SourceBranch'], 'refs/heads/main') ]

stages:
- stage: Build
  jobs:
  - job: Build
    steps:
      - template: eng/azure-devops/steps/ensure-dotnet.yml

      - pwsh: |
          .\build.ps1 -Target CleanBuild
        displayName: Build

      - task: PublishTestResults@2
        condition: always()
        displayName: Publish Test Results
        inputs:
          testResultsFormat: 'VSTest'
          testResultsFiles: '$(Build.SourcesDirectory)/artifacts/TestResults/*.trx'
          mergeTestResults: true

      - pwsh: |
          cd artifacts
          mkdir drop
          copy *.zip drop
        displayName: Prepare artifact drop

      - task: PublishPipelineArtifact@1
        displayName: Publish artifacts
        inputs:
          targetPath: './artifacts/drop'
          artifact: 'build'
          publishLocation: 'pipeline'

- stage: Deploy
  condition: |
    and(
      succeeded(),
      eq(variables['IS_MAIN_BRANCH'], true),
      eq(variables['IS_PULLREQUEST'], false)
    )
  jobs:
  - deployment: Deploy
    environment: jvandertil-blog-prd
    strategy:
      runOnce:
        deploy:
          steps:
          - download: none
          - checkout: self

          - template: eng/azure-devops/steps/ensure-dotnet.yml

          - task: DownloadPipelineArtifact@2
            inputs:
              buildType: 'current'
              artifactName: 'build'
              targetPath: './artifacts'

          - task: AzureCLI@2
            displayName: 'Run deployment script'
            inputs:
              azureSubscription: 'sub-jvdtil-quintor (SPN)'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                .\build.ps1 -Target Deploy -Environment prd -CloudflareApiKey $env:CLOUDFLARE_API_KEY -CloudflareZoneId $env:CLOUDFLARE_ZONE_ID
            env:
              CLOUDFLARE_API_KEY: $(SECRET_CF_API_KEY)
              CLOUDFLARE_ZONE_ID: $(SECRET_CF_ZONE_ID)


